{% extends "base.html" %}

{% block title %}
Calendário
{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <h2>
        <i class="bi bi-calendar3"></i>
        Calendário da Frota
    </h2>

    <a href="{{ url_for('agendamentos.novo') }}" class="btn btn-primary">
        <i class="bi bi-plus-circle"></i> Novo Agendamento
    </a>

</div>

<div class="card shadow">

    <div class="card-body">

        <div id="calendar"></div>

    </div>

</div>


<div class="modal fade" id="eventoModal" tabindex="-1">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    <i class="bi bi-calendar-event"></i>
                    Detalhes do Agendamento

                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <div class="row g-3">

                    <div class="col-md-6">

                        <div class="p-2 bg-light rounded">
                            <small class="text-muted">Veículo</small>
                            <p class="mb-0 fw-bold" id="modalVeiculo"></p>
                        </div>

                    </div>

                    <div class="col-md-6">

                        <div class="p-2 bg-light rounded">
                            <small class="text-muted">Placa</small>
                            <p class="mb-0 fw-bold" id="modalPlaca"></p>
                        </div>

                    </div>

                    <div class="col-md-6">

                        <div class="p-2 bg-light rounded">
                            <small class="text-muted">Motorista</small>
                            <p class="mb-0 fw-bold" id="modalMotorista"></p>
                        </div>

                    </div>

                    <div class="col-md-6">

                        <div class="p-2 bg-light rounded">
                            <small class="text-muted">Destino</small>
                            <p class="mb-0 fw-bold" id="modalDestino"></p>
                        </div>

                    </div>

                    <div class="col-md-6">

                        <div class="p-2 bg-light rounded">
                            <small class="text-muted">Início</small>
                            <p class="mb-0 fw-bold" id="modalInicio"></p>
                        </div>

                    </div>

                    <div class="col-md-6">

                        <div class="p-2 bg-light rounded">
                            <small class="text-muted">Fim</small>
                            <p class="mb-0 fw-bold" id="modalFim"></p>
                        </div>

                    </div>

                    <div class="col-md-6">

                        <div class="p-2 bg-light rounded">
                            <small class="text-muted">Status</small>
                            <p class="mb-0" id="modalStatus"></p>
                        </div>

                    </div>

                </div>

                <hr>

                <div class="p-2 bg-light rounded">
                    <small class="text-muted">Observações</small>
                    <p class="mb-0" id="modalObservacoes"></p>
                </div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    <i class="bi bi-x-lg"></i> Fechar

                </button>

                <a
                    id="btnEditar"
                    class="btn btn-primary">

                    <i class="bi bi-pencil"></i> Editar

                </a>

            </div>

        </div>

    </div>

</div>

<link
href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/index.global.min.css"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/index.global.min.js"></script>

<script src="{{ url_for('static', filename='js/calendario.js') }}"></script>


{% endblock %}
