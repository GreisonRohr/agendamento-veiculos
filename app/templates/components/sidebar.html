<div class="sidebar" id="sidebar">

    <div class="logo">

        <h3 class="mb-1">

            <i class="bi bi-car-front-fill"></i>

            Garagem Lab

        </h3>

    </div>

    <nav class="mt-4">

        <a href="{{ url_for('dashboard.index') }}" class="{% if request.endpoint and request.endpoint.startswith('dashboard') %}active{% endif %}">

            <i class="bi bi-speedometer2"></i>

            <span>Dashboard</span>

        </a>

        <a href="{{ url_for('agenda.index') }}" class="{% if request.endpoint and request.endpoint.startswith('agenda') %}active{% endif %}">

            <i class="bi bi-calendar-week"></i>

            <span>Agenda da Frota</span>

        </a>

        <a href="{{ url_for('calendario.index') }}" class="{% if request.endpoint and request.endpoint.startswith('calendario') %}active{% endif %}">

            <i class="bi bi-calendar3"></i>

            <span>Calendário</span>

        </a>

        <a href="{{ url_for('historico.index') }}" class="{% if request.endpoint and request.endpoint.startswith('historico') %}active{% endif %}">

            <i class="bi bi-clock-history"></i>

            <span>Histórico</span>

        </a>

        {% if session.get('is_admin') %}

        <a href="{{ url_for('veiculos.index') }}" class="{% if request.endpoint and request.endpoint.startswith('veiculo') %}active{% endif %}">

            <i class="bi bi-car-front"></i>

            <span>Veículos</span>

        </a>

        {% endif %}

        <a href="{{ url_for('agendamentos.index') }}" class="{% if request.endpoint and request.endpoint.startswith('agendamento') %}active{% endif %}">

            <i class="bi bi-calendar-check"></i>

            <span>Agendamentos</span>

        </a>

        {% if session.get('is_admin') %}

        <a href="{{ url_for('manutencoes.index') }}" class="{% if request.endpoint and request.endpoint.startswith('manutenc') %}active{% endif %}">

            <i class="bi bi-tools"></i>

            <span>Manutenções</span>

        </a>

        {% endif %}

        <a href="{{ url_for('relatorios.index') }}" class="{% if request.endpoint and request.endpoint.startswith('relatorio') %}active{% endif %}">

            <i class="bi bi-file-earmark-bar-graph"></i>

            <span>Relatórios</span>

        </a>

    </nav>

    <div class="sidebar-footer">

        {% if session.get('is_admin') %}

        <a href="{{ url_for('configuracoes.index') }}" class="{% if request.endpoint and request.endpoint.startswith('configurac') %}active{% endif %}">

            <i class="bi bi-gear"></i>

            <span>Configurações</span>

        </a>

        {% endif %}

    </div>

</div>
